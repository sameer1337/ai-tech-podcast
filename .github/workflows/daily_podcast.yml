name: Daily Podcast Generator

on:
  schedule:
    - cron: '0 6 * * *'    # MORNING (full): podcast + blog + video + deploy
    - cron: '0 18 * * *'   # EVENING (light): rebuild pages + homepage + deploy only
  workflow_dispatch:        # manual trigger
    inputs:
      mode:
        description: 'full = regenerate podcasts + upload to YouTube; pages_only = just rebuild/redeploy the site'
        type: choice
        default: full
        options: [full, pages_only]

jobs:
  generate-episode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate all podcast episodes (morning only)
        if: github.event.schedule != '0 18 * * *' && github.event.inputs.mode != 'pages_only'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUTF8: "1"
        run: python run_all.py

      - name: Install FFmpeg + thumbnail font (morning only)
        if: github.event.schedule != '0 18 * * *' && github.event.inputs.mode != 'pages_only'
        run: sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Publish new blog posts (evening only, text-only)
        if: github.event.schedule == '0 18 * * *'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUTF8: "1"
        run: python run_blog.py

      - name: Publish trending-keyword SEO posts (both runs)
        if: github.event.inputs.mode != 'pages_only'
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUTF8: "1"
        run: python run_trending.py --max 3

      - name: Generate podcast pages
        env:
          PYTHONUTF8: "1"
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          GSC_VERIFICATION: ${{ secrets.GSC_VERIFICATION }}
        run: python generate_pages.py

      - name: Build mega-menu homepage (latest blogs + slider)
        env:
          PYTHONUTF8: "1"
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          GSC_VERIFICATION: ${{ secrets.GSC_VERIFICATION }}
        run: python generate_home.py

      - name: Deploy site to Hostinger (FTP)
        continue-on-error: true   # site deploy failure must not block YouTube uploads + episode push
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
          PYTHONUTF8: "1"
        run: python deploy_ftp.py

      - name: Ping IndexNow (Bing/Yandex instant indexing)
        continue-on-error: true
        env:
          PYTHONUTF8: "1"
        run: python submit_indexnow.py

      # Shorts first: the channel only allows ~3 uploads per rolling 24h,
      # so the discovery content (vertical Shorts for the two strongest shows)
      # must claim quota before the long-form episode uploads do.
      - name: Generate + upload YouTube Shorts for winner shows (morning only)
        if: github.event.schedule != '0 18 * * *' && github.event.inputs.mode != 'pages_only'
        continue-on-error: true
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SHORT_GROQ_MODEL:     llama-3.1-8b-instant   # separate token pool from the 70B podcasts
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CHANNEL_ID:        ${{ secrets.YT_CHANNEL_ID }}
          PYTHONUTF8: "1"
        run: |
          # Three Shorts lanes (channel cap is ~3 uploads/24h), proven winners first:
          #   football   = evergreen TOPIC, rotating league/player queries (never dark)
          #   true-crime = NICHE Short off the day's true-crime episode (top performer)
          #   combat     = evergreen TOPIC, UFC/boxing/MMA test lane (KO shorts scale big)
          # Order = priority: if the cap is hit, the test lane (combat) is dropped first.
          for NICHE in football true-crime combat; do
            echo "==> Short for $NICHE"
            python generate_short.py --niche "$NICHE" \
              || { echo "[warn] Short generation failed for $NICHE"; continue; }
            python upload_short.py --niche "$NICHE" \
              || echo "[warn] Short upload failed for $NICHE"
          done

      # DISABLED 2026-07-13: podcast videos got ~0 views but ate the channel's scarce
      # daily YouTube upload limit (uploadLimitExceeded), blocking the football Shorts
      # that actually perform. Podcasts still generate audio/RSS/blog (Spotify + site);
      # only the YouTube video upload is off. Re-enable by restoring the original `if:`.
      - name: Upload all podcasts to YouTube (DISABLED — quota reserved for football)
        if: false  # was: github.event.schedule != '0 18 * * *' && github.event.inputs.mode != 'pages_only'
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}   # needed for the AI thumbnail hook
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CHANNEL_ID:        ${{ secrets.YT_CHANNEL_ID }}
          PYTHONUTF8: "1"
        run: |
          TODAY=$(date +%Y-%m-%d)
          declare -A EPISODE_DIRS
          EPISODE_DIRS["ai-tech"]="episodes"
          EPISODE_DIRS["finance"]="episodes/finance"
          EPISODE_DIRS["health"]="episodes/health"
          EPISODE_DIRS["startup"]="episodes/startup"
          EPISODE_DIRS["crypto"]="episodes/crypto"
          EPISODE_DIRS["world-news"]="episodes/world"
          EPISODE_DIRS["true-crime"]="episodes/truecrime"

          # Winners first - remaining upload quota goes to the shows with traction
          for NICHE in startup true-crime ai-tech finance health crypto world-news; do
            DIR="${EPISODE_DIRS[$NICHE]}"
            EPISODE=$(ls "${DIR}"/ep*_${TODAY}.mp3 2>/dev/null | tail -1)
            if [ -n "$EPISODE" ]; then
              EP_NUM=$(basename "$EPISODE" | grep -o 'ep[0-9]*' | grep -o '[0-9]*' | sed 's/^0*//')
              # Read story headlines saved by run_all.py
              NICHE_LOG_ID="${NICHE//-/_}"
              STORIES_FILE="logs/${NICHE}/${TODAY}_stories.txt"
              STORIES=""
              [ -f "$STORIES_FILE" ] && STORIES=$(cat "$STORIES_FILE")
              echo "==> Uploading $NICHE episode $EP_NUM ($(echo $STORIES | cut -c1-60)...)"
              SCRIPT_FILE="logs/${NICHE}/${TODAY}_script.txt"
              python upload_youtube.py \
                --niche "$NICHE" \
                --episode "$EPISODE" \
                --number "$EP_NUM" \
                --stories "$STORIES" \
                --script-file "$SCRIPT_FILE" \
                || echo "[warn] Upload failed for $NICHE"
            else
              echo "[skip] No episode today for $NICHE"
            fi
          done

      - name: Push all episodes to GitHub
        run: |
          git config user.name "Podcast Bot"
          git config user.email "hunk1.on11@gmail.com"
          git add episodes/ feeds/ feed.xml logs/ shorts/ index.html podcasts/ \
                  blog/ about.html mapt.html vita.html privacy.html sitemap.xml robots.txt assets/
          git diff --staged --quiet || git commit -m "All episodes + pages $(date +%Y-%m-%d)"
          git pull --rebase --autostash origin master
          git push

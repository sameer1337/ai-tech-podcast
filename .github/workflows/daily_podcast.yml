name: Daily Podcast Generator

on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 6:00 AM UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  generate-episode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate all podcast episodes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUTF8: "1"
        run: python run_all.py

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Generate podcast pages
        env:
          PYTHONUTF8: "1"
        run: python generate_pages.py

      - name: Upload AI Tech Daily to YouTube
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN_AI_TECH: ${{ secrets.YT_REFRESH_TOKEN_AI_TECH }}
          PYTHONUTF8: "1"
        run: |
          # Find today's latest episode
          EPISODE=$(ls episodes/ep*_$(date +%Y-%m-%d).mp3 2>/dev/null | tail -1)
          if [ -n "$EPISODE" ]; then
            EP_NUM=$(echo "$EPISODE" | grep -o 'ep[0-9]*' | grep -o '[0-9]*' | sed 's/^0*//')
            python upload_youtube.py --niche ai-tech --episode "$EPISODE" --number "$EP_NUM"
          else
            echo "No new episode today, skipping YouTube upload"
          fi

      - name: Push all episodes to GitHub
        run: |
          git config user.name "Podcast Bot"
          git config user.email "hunk1.on11@gmail.com"
          git add episodes/ feeds/ feed.xml logs/ index.html podcasts/
          git diff --staged --quiet || git commit -m "All episodes + pages $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push

name: Daily Podcast Generator

on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 6:00 AM UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  generate-episode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate all podcast episodes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUTF8: "1"
        run: python run_all.py

      - name: Push all episodes to GitHub
        run: |
          git config user.name "Podcast Bot"
          git config user.email "hunk1.on11@gmail.com"
          git add episodes/ feeds/ feed.xml logs/
          git diff --staged --quiet || git commit -m "All episodes $(date +%Y-%m-%d)"
          git push

name: Daily Podcast Generator

on:
  schedule:
    - cron: '0 6 * * *'    # MORNING (full): podcast + blog + video + deploy
    - cron: '0 18 * * *'   # EVENING (light): rebuild pages + homepage + deploy only
  workflow_dispatch:        # manual trigger = full run

jobs:
  generate-episode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate all podcast episodes (morning only)
        if: github.event.schedule != '0 18 * * *'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUTF8: "1"
        run: python run_all.py

      - name: Install FFmpeg (morning only)
        if: github.event.schedule != '0 18 * * *'
        run: sudo apt-get install -y ffmpeg

      - name: Publish new blog posts (evening only, text-only)
        if: github.event.schedule == '0 18 * * *'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUTF8: "1"
        run: python run_blog.py

      - name: Generate podcast pages
        env:
          PYTHONUTF8: "1"
        run: python generate_pages.py

      - name: Build mega-menu homepage (latest blogs + slider)
        env:
          PYTHONUTF8: "1"
        run: python generate_home.py

      - name: Deploy site to Hostinger (FTP)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
          PYTHONUTF8: "1"
        run: python deploy_ftp.py

      - name: Upload all podcasts to YouTube (morning only)
        if: github.event.schedule != '0 18 * * *'
        env:
          GOOGLE_CLIENT_ID:              ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:          ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN_AI_TECH:      ${{ secrets.YT_REFRESH_TOKEN_AI_TECH }}
          YT_REFRESH_TOKEN_FINANCE:      ${{ secrets.YT_REFRESH_TOKEN_FINANCE }}
          YT_REFRESH_TOKEN_HEALTH:       ${{ secrets.YT_REFRESH_TOKEN_HEALTH }}
          YT_REFRESH_TOKEN_STARTUP:      ${{ secrets.YT_REFRESH_TOKEN_STARTUP }}
          YT_REFRESH_TOKEN_CRYPTO:       ${{ secrets.YT_REFRESH_TOKEN_CRYPTO }}
          YT_REFRESH_TOKEN_WORLD:        ${{ secrets.YT_REFRESH_TOKEN_WORLD }}
          YT_REFRESH_TOKEN_TRUECRIME:    ${{ secrets.YT_REFRESH_TOKEN_TRUECRIME }}
          PYTHONUTF8: "1"
        run: |
          TODAY=$(date +%Y-%m-%d)
          declare -A EPISODE_DIRS
          EPISODE_DIRS["ai-tech"]="episodes"
          EPISODE_DIRS["finance"]="episodes/finance"
          EPISODE_DIRS["health"]="episodes/health"
          EPISODE_DIRS["startup"]="episodes/startup"
          EPISODE_DIRS["crypto"]="episodes/crypto"
          EPISODE_DIRS["world-news"]="episodes/world"
          EPISODE_DIRS["true-crime"]="episodes/truecrime"

          for NICHE in ai-tech finance health startup crypto world-news true-crime; do
            DIR="${EPISODE_DIRS[$NICHE]}"
            EPISODE=$(ls "${DIR}"/ep*_${TODAY}.mp3 2>/dev/null | tail -1)
            if [ -n "$EPISODE" ]; then
              EP_NUM=$(basename "$EPISODE" | grep -o 'ep[0-9]*' | grep -o '[0-9]*' | sed 's/^0*//')
              # Read story headlines saved by run_all.py
              NICHE_LOG_ID="${NICHE//-/_}"
              STORIES_FILE="logs/${NICHE}/${TODAY}_stories.txt"
              STORIES=""
              [ -f "$STORIES_FILE" ] && STORIES=$(cat "$STORIES_FILE")
              echo "==> Uploading $NICHE episode $EP_NUM ($(echo $STORIES | cut -c1-60)...)"
              SCRIPT_FILE="logs/${NICHE}/${TODAY}_script.txt"
              python upload_youtube.py \
                --niche "$NICHE" \
                --episode "$EPISODE" \
                --number "$EP_NUM" \
                --stories "$STORIES" \
                --script-file "$SCRIPT_FILE" \
                || echo "[warn] Upload failed for $NICHE"
            else
              echo "[skip] No episode today for $NICHE"
            fi
          done

      - name: Push all episodes to GitHub
        run: |
          git config user.name "Podcast Bot"
          git config user.email "hunk1.on11@gmail.com"
          git add episodes/ feeds/ feed.xml logs/ index.html podcasts/
          git diff --staged --quiet || git commit -m "All episodes + pages $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push
